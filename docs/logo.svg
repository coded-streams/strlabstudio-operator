<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1018"/>
      <stop offset="100%" style="stop-color:#131920"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a884"/>
    </linearGradient>
    <clipPath id="clip">
      <polygon points="0,0 160,0 200,40 200,200 40,200 0,160"/>
    </clipPath>
  </defs>

  <!-- Background shape — exact IDE logo clip-path scaled to 200x200 -->
  <polygon points="0,0 160,0 200,40 200,200 40,200 0,160"
           fill="url(#bg)" stroke="url(#accent)" stroke-width="3"/>

  <!-- Corner cut accent line -->
  <line x1="160" y1="0" x2="200" y2="40"
        stroke="#00d4aa" stroke-width="2" opacity="0.5"/>

  <!-- Code brackets icon — scaled up, centered -->
  <!-- Left bracket: < -->
  <polyline points="68,72 36,100 68,128"
            fill="none" stroke="url(#accent)"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket: > -->
  <polyline points="132,72 164,100 132,128"
            fill="none" stroke="url(#accent)"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle grid dot pattern for depth -->
  <g opacity="0.07" fill="#00d4aa">
    <circle cx="30" cy="30" r="2"/><circle cx="60" cy="30" r="2"/><circle cx="90" cy="30" r="2"/>
    <circle cx="30" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="90" cy="60" r="2"/>
    <circle cx="170" cy="110" r="2"/><circle cx="170" cy="140" r="2"/><circle cx="170" cy="170" r="2"/>
    <circle cx="140" cy="140" r="2"/><circle cx="140" cy="170" r="2"/>
  </g>
</svg>
