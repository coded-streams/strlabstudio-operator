{{- if .Values.installCRD }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: strlabstudios.codedstreams.io
  annotations:
    helm.sh/resource-policy: keep
spec:
  group: codedstreams.io
  scope: Namespaced
  names:
    plural: strlabstudios
    singular: strlabstudio
    kind: StrlabStudio
    shortNames:
      - sls
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
{{- end }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: strlabstudio-operator
  namespace: {{ .Values.operatorNamespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: strlabstudio-operator
rules:
  - apiGroups: ["codedstreams.io"]
    resources: ["strlabstudios", "strlabstudios/status", "strlabstudios/finalizers"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "events"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strlabstudio-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strlabstudio-operator
subjects:
  - kind: ServiceAccount
    name: strlabstudio-operator
    namespace: {{ .Values.operatorNamespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strlabstudio-operator
  namespace: {{ .Values.operatorNamespace }}
  labels:
    app: strlabstudio-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strlabstudio-operator
  template:
    metadata:
      labels:
        app: strlabstudio-operator
    spec:
      serviceAccountName: strlabstudio-operator
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "kopf"
            - "run"
            - "/app/controllers/strlabstudio_controller.py"
            - "--all-namespaces"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}