---
# config/rbac/rbac.yaml
# Apply after CRD:  kubectl apply -f config/rbac/rbac.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: strlab-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: strlabstudio-operator
  namespace: strlab-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: strlabstudio-operator
rules:
  # Manage StrlabStudio CRs and their status
  - apiGroups: ["codedstreams.io"]
    resources: ["strlabstudios", "strlabstudios/status", "strlabstudios/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Manage Services and ConfigMaps
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Post Events for observability
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strlabstudio-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strlabstudio-operator
subjects:
  - kind: ServiceAccount
    name: strlabstudio-operator
    namespace: strlab-system