---
# config/manager/manager.yaml
# Deploys the operator controller into the cluster.
# Prerequisites:
#   kubectl apply -f config/crd/flinksqlstudios.yaml
#   kubectl apply -f config/rbac/rbac.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flinksqlstudio-operator
  namespace: flinksql-system
  labels:
    app: flinksqlstudio-operator
    control-plane: flinksqlstudio-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flinksqlstudio-operator
  template:
    metadata:
      labels:
        app: flinksqlstudio-operator
        control-plane: flinksqlstudio-operator
    spec:
      serviceAccountName: flinksqlstudio-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: operator
          image: codedstreams/flinksql-kube-operator:latest
          imagePullPolicy: Always
          command: ["kopf", "run", "/app/controllers/flinksqlstudio_controller.py", "--all-namespaces"]
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu:    "50m"
              memory: "96Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
