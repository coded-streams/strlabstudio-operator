---
# config/samples/basic.yaml — Minimal StrlabStudio CR
# kubectl apply -f config/samples/basic.yaml
apiVersion: codedstreams.io/v1alpha1
kind: StrlabStudio
metadata:
  name: dev
  namespace: default
spec:
  gateway:
    host: flink-sql-gateway.flink.svc.cluster.local
    port: 8083
  jobmanager:
    host: flink-jobmanager.flink.svc.cluster.local
    port: 8081
  service:
    type: ClusterIP
    port: 80