---
# config/samples/production.yaml — Full production StrlabStudio CR
# kubectl apply -f config/samples/production.yaml
apiVersion: codedstreams.io/v1alpha1
kind: StrlabStudio
metadata:
  name: production
  namespace: data-platform
  labels:
    team: data-engineering
    env:  production
spec:
  image:    codedstreams/strlabstudio:v1.0.22    # pin to specific version in prod
  replicas: 2
  gateway:
    host: flink-sql-gateway.flink-prod.svc.cluster.local
    port: 8083
  jobmanager:
    host: flink-jobmanager.flink-prod.svc.cluster.local
    port: 8081
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      cpu:    "100m"
      memory: "128Mi"
    limits:
      cpu:    "500m"
      memory: "256Mi"
  extraEnv:
    - name:  STUDIO_TITLE
      value: "Production Str:::lab Studio"